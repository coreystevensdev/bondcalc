name: Deploy to AWS EC2

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          ECR_REPO: ${{ secrets.ECR_API_REPO }}
        run: |
          SHORT="${HEAD_SHA:0:7}"
          echo "image=${ECR_REPO}:sha-${SHORT}" >> "$GITHUB_OUTPUT"
        id: tag

      - name: Build and push Docker image
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Update EC2 with new image
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          # deploy.sh (installed by user_data) pulls JWT_SECRET from SSM Parameter
          # Store itself, so it never appears in this command string or in CloudTrail.
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=['/usr/local/bin/deploy.sh $IMAGE']"

      - name: Smoke test production
        env:
          PROD_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          for i in $(seq 1 10); do
            if curl -sf "${PROD_URL}/health"; then
              exit 0
            fi
            sleep 5
          done
          echo "server never became healthy after deploy"
          exit 1
